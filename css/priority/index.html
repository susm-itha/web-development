<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>priority</title>
</head>
<body>
    <style>
   body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        
        .header {
            background-color: #e09b9b;
            color: #1b5e20;
            padding: 5px;
            width: 250px;
            text-align: center;
            margin-bottom: 5px;
        }

        
        .blue-bar {
            background-color: blue;
            color: black;
            width: 500px;
            height: 25px;
            margin-bottom: 20px;
        }

       
        h1 {
            border: 2px solid black;
            margin: 20px;
            padding: 0;
            min-width: 60px;
            min-height: 40px;
            width: 670px;
            font-size: 32px;
        }

      
        #box1, #box12 {
            box-sizing: content-box;
            background-color: #b26868; 
        }

       
        #box2 {
            box-sizing: border-box;
            background-color: #8b0000; 
        }

       
        button {
            margin-right: 5px;
            padding: 2px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">Lorem ipsum dolor sit amet.</div>
    
    <div class="blue-bar">Hello</div>

    <h1 id="box1">content-box</h1>
    
    <h1 id="box12">content-box</h1>
    
    <h1 id="box2">border-box</h1>

    <button>One</button>
    <button>Two</button>
    
</body>
</html>
